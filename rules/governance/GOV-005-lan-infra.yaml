# 中文摘要：LAN 基础设施——设备角色、git-server 为私有仓真相源、CI 分层、双重备份。
# 与 GOV-004 配合：004 管 remote/协作；005 管设备、CI、备份与目标态工作流。
rule_id: "GOV-005"
title: "LAN infrastructure — devices, source of truth, CI tiers, backup"
category: "governance"
severity: "high"
priority: 5
languages: []

applicable_projects:
  - "ai-lib-constitution"
  - "ai-lib-plans"
  - "papers"
  - "eos"
  - "ai-lib-gateway"
  - "infra"

description: |
  **Scope:** On-premise LAN infrastructure supporting private repos governed by
  GOV-004. Public runtime repos (ailib-official) follow GOV-001; this rule
  covers **git-server**, **piubt**, dev terminals, CI placement, and backup.

  **Relationship to GOV-004:** GOV-004 defines **`lan`** vs **`origin`** remotes
  and trial discipline. GOV-005 defines **infrastructure target state**:
  git-server is **source of truth** for private code; light CI on LAN; heavy CI
  on GitHub Actions (eos during transition). During GOV-004 **trial**, hiddenpath
  `origin` for eos is **retained** for heavy CI — not contradictory with SoT on
  lan after every merge sync.

  **Devices (fixed hostnames — do not rename):**

  | Host | IP | Hardware | Role |
  |------|-----|----------|------|
  | `alex-S8` | — | x86 PC | Dev terminal; no long-lived repo copies |
  | `piubt` | 192.168.2.13 | RPi 4B 3.7G | Proxy, tools, light CI runner |
  | `git-server` | 192.168.2.22 | RPi 4B 1.8G | Bare git SoT, backup scripts, optional light CI |

  DNS alias: `git-server.local` (= `git-server`).

  **Source of truth:** Bare repos under `/srv/git/repos/` on git-server are the
  authoritative copy for private repos. Workstations clone from LAN, push to
  **`lan`**, avoid maintaining parallel local-only canonical copies.

  **Public release:** Open source publishes to **ailib-official** only, via
  **manual or scripted** push — no automatic LAN→GitHub sync (DOC-002 leak
  prevention).

  **hiddenpath private repos (target):** Stop maintaining over time; archive when
  GOV-004 trial closes. **Transition:** eos heavy CI on origin until LAN CI matures.

  Operational detail: **ai-lib-plans/active/projects/infra/LAN_INFRA.md**.

core_principles:
  - "git-server bare repos are SoT for private code; daily push/pull uses remote lan."
  - "Light CI on LAN (fmt/clippy/unit); heavy CI on GitHub Actions for eos."
  - "Dual off-site backup of all bare repos (gitmirror01 USB + gitmirror02 on piubt)."
  - "No automatic sync from LAN private repos to ailib-official."
  - "Dev terminals should not hoard stale long-lived clones; clone → work → push lan."

requirements:
  - "All in-scope bare repos listed in LAN_INFRA.md MUST exist on git-server."
  - "Document-class repos (constitution, plans, papers): post-receive hook triggers real-time backup."
  - "Full backup cron daily; manual `git-backup.sh full` after major infra changes."
  - "Light CI runners MAY run on piubt or git-server; MUST NOT starve piubt proxy."
  - "After eos GitHub merge: sync lan within 24h (GOV-004/GOV-005 joint requirement)."
  - "SSH-only repo access; no guest Samba exposure (see GOV-004 v1.1)."

ci_tiers:
  light:
    location: "piubt or git-server"
    scope: "cargo fmt, clippy, unit tests, git hook checks"
    latency: "seconds; LAN <1ms to git-server"
  heavy:
    location: "GitHub Actions (hiddenpath/eos during trial)"
    scope: "release build, WASM, docker/e2e, cross-platform, release artifacts"
    note: "Migrate to LAN only with recorded infra decision"

backup:
  primary_script: "git-server:/home/git/git-backup.sh"
  log: "git-server:/home/git/git-backup.log"
  destinations:
    - name: gitmirror01
      host: git-server
      path: "/mnt/backup/gitmirror01/"
      media: "USB 500G HDD NTFS"
    - name: gitmirror02
      host: piubt
      path: "/gitmirror02/"
      transport: "rsync over SSH"
  cadence:
    realtime: "constitution, plans, papers — post-receive hook"
    daily: "all repos — cron 0 11 * * *"
    snapshot: "snapshot-YYYYMMDD on gitmirror01, retain 30 days"

repository_inventory:
  see: "ai-lib-plans/active/projects/infra/LAN_INFRA.md"

relationship_to_other_rules:
  - "GOV-004: remote naming (lan/origin), trial, eos dual-remote sync."
  - "GOV-001: public code on ailib-official; no LAN auto-publish."
  - "GOV-003: eos PR merge → Phase 4b lan sync."
  - "DOC-002: no private content on public org."

validation:
  - type: "review_checklist"
    items:
      - "LAN_INFRA.md repo list matches /srv/git/repos/ on git-server."
      - "Backup log shows successful daily run within 48h."
      - "Light CI job can clone from git-server and run fmt/clippy on a sample repo."
      - "eos lan/main not behind origin/main >24h after merge."

references:
  related_rules:
    - "GOV-004"
    - "GOV-001"
    - "GOV-003"
  operational_runbook: "ai-lib-plans/active/projects/infra/LAN_INFRA.md"
  git_collaboration: "ai-lib-plans/docs/governance/LAN_GIT.md"
  tasks: "ai-lib-plans/active/projects/infra/TASKS_INDEX.md"

metadata:
  author: "ai-lib team"
  created: "2026-06-05"
  updated: "2026-06-05"
