---
rule_id: "GOV-004"
title: "Internal repos MUST maintain a LAN mirror on the private git server"
category: "governance"
severity: "high"
priority: 4
languages: []

applicable_projects:
  - "ai-lib-constitution"
  - "ai-lib-plans"
  - "papers"

description: |
  Per GOV-001, ai-lib-constitution, ai-lib-plans, and papers are internal
  repos that MUST NOT be pushed or mirrored to ailib-official. This rule
  establishes the requirement for a LAN-accessible mirror as a backup and
  secondary access point.

  The canonical LAN mirror is the **git-server** (192.168.2.22, git-server.local),
  a Raspberry Pi 4B running Ubuntu Server 24.04 LTS on the local network.

  **Mandatory practices:**

  1. **Repository mirroring**: Every internal repo listed in `applicable_projects`
     MUST be pushed to the LAN git server as a bare repository under
     `/srv/git/repos/<repo-name>.git`.

  2. **Local remote**: Every developer workstation MUST have a `lan` remote
     pointing to `git@git-server.local:/srv/git/repos/<repo-name>.git`.

  3. **Sync cadence**: Push to the LAN mirror after every significant change
     (merged PR, new rule, MEMORY.md update). The LAN mirror must not be more
     than 24 hours behind `origin`.

  4. **Access control**: Internal repos on the LAN mirror are SSH-only
     (authenticated via the `git` user). They MUST NOT be exposed through
     guest-accessible Samba shares.

  5. **Bootstrap**: A fresh clone from the LAN mirror should produce an identical
     working tree to `origin`. Use `git push --all lan` to sync.

  **Verification:**
  ```bash
  git -C <local-repo> fetch lan && git -C <local-repo> log --oneline lan/main..origin/main | wc -l
  ```
  Non-zero output indicates the LAN mirror is behind.

related_rules:
  - "GOV-001"
