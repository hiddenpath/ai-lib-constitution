---
rule_id: "GOV-001"
title: "Canonical public org (ailib-official), internal repos on hiddenpath, Rust monorepo"
category: "governance"
severity: "high"
priority: 1
languages: []

applicable_projects:
  - "ai-lib-rust"
  - "ai-lib-plans"
  - "ai-protocol"
  - "ai-lib-python"
  - "ai-lib-ts"
  - "ai-lib-go"
  - "ai-lib-constitution"

description: |
  **ailib-official** is the single canonical GitHub organization for all public
  ai-lib code repositories. Day-to-day development, PRs, issues, CI, and
  releases all happen directly on **ailib-official**. There is no separate
  development mirror; the `hiddenpath` organization is **archived/read-only**
  for public code repos (retained only for historical reference).

  The **ai-lib-rust** execution/contact/wasm crates remain a **single Cargo
  workspace in one repository** until explicit split signals appear (independent
  release cadence, separate owning teams, or CI isolation requirements). Physical
  separation is achieved via workspace **crates**, not separate repos, unless
  governance approves a migration.

  **Internal-only repositories:** **ai-lib-constitution** and **ai-lib-plans** are
  for **internal** team workflow (rules, tasks, memory). They remain on
  **hiddenpath** (private) and MUST **never** be pushed, mirrored, or published
  to **ailib-official**.

  **Onboarding:** Agents and developers MUST repoint local `origin` for public
  repos to `ailib-official/*` if still on `hiddenpath/*`. Operational steps live
  in **ai-lib-plans** `docs/governance/REMOTE_MIGRATION.md` (kept in plans, not
  duplicated in constitution).

core_principles:
  - "All public development, CI, PRs, issues, and releases happen on ailib-official."
  - "hiddenpath public code repos are archived/read-only; no new development there."
  - "One URL story: all docs, metadata, registry links, and CI checkouts point to ailib-official."
  - "Rust: one repo, multiple crates (core / contact / wasm / facade), not multiple repos by default."
  - "ai-lib-constitution and ai-lib-plans stay internal on hiddenpath: never publish to ailib-official."

requirements:
  - "Default branch and PR flow follow ARCH-004 (`main`)."
  - "Local git `origin` for public repos MUST point to `ailib-official/<repo>`."
  - "CI workflows that checkout sibling repos (ai-protocol, ai-protocol-mock, etc.) MUST use `ailib-official/<repo>` — no `hiddenpath/*` in `.github/workflows/**`."
  - "When reconciling forks, prefer one consolidation commit or cherry-pick over leaving contradictory repository fields."
  - "Stale remote branches that are fully superseded by merged PRs SHOULD be deleted after verification."
  - "Do not split ai-lib-rust into separate Git repositories for core/contact/wasm without a recorded decision and migration plan."
  - "MUST NOT add ailib-official as a remote for ai-lib-constitution or ai-lib-plans; MUST NOT mirror those repositories to ailib-official."

relationship_to_other_rules:
  - "GOV-002: merge conflict resolution MUST not reintroduce hiddenpath URLs in workflows or README repository fields."
  - "TEST-002: public URL hygiene (ailib-official); narrow file-scoped exceptions (e.g. legacy loader paths) are defined there."
  - "ARCH-003: cross-runtime consistency is independent of local clone path; public canonical org is fixed to ailib-official per this rule."

validation:
  - type: "review_checklist"
    items:
      - "No new hiddenpath URLs in README/Cargo.toml/package.json repository fields (see TEST-002 for scoped exceptions)."
      - "CI workflows only reference ailib-official for cross-repo checkouts (protocol, mock, etc.)."
      - "Confirm no ailib-official remote or mirror is introduced for ai-lib-constitution or ai-lib-plans."
      - "New clones follow REMOTE_MIGRATION.md in ai-lib-plans when origin still points at hiddenpath public repos."

references:
  related_rules:
    - "TEST-002"
    - "ARCH-004"
    - "ARCH-003"
    - "TEST-001"
  operational_runbook: "ai-lib-plans/docs/governance/REMOTE_MIGRATION.md"

metadata:
