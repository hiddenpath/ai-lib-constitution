---
rule_id: "BIZ-002"
title: "Three-Zone Open/Close Boundary (A/B/C Bands)"
category: "business"
severity: "critical"
priority: 1
languages: []
applicable_projects:
  - "prism"
  - "vela"
  - "eos"
  - "ai-protocol"
  - "ai-lib-rust"
  - "ai-lib-python"
  - "ai-lib-ts"
  - "ai-lib-go"

description: |
  All ai-lib ecosystem code/assets are classified into three zones
  (A/B/C bands) governing license, openness, and distribution rules.
  No A-band content may be moved to C-band without owner approval.
  No C-band content may be silently mixed into A-band repositories.

core_principle: |
  - A-band (Permanently Open): Apache-2.0; full public distribution
  - B-band (Open, No SLA): Apache-2.0 + explicit NOT PRODUCTION SLA disclaimer
  - C-band (May be closed): Proprietary / dual-license TBD; private repos

zone_table:
  A-band:
    license: "Apache-2.0"
    content:
      - "ai-protocol schemas"
      - "E-layer (ai-lib-core / SDK / WASM basic)"
      - "prism-core (proxy, key-pool, router, usage, admin logic, Anthropic adapter)"
      - "Vela client core"
      - "Benchmark methods/baselines"
  B-band:
    license: "Apache-2.0 + NOT PRODUCTION SLA disclaimer"
    content:
      - "Contact (P) reference implementations"
      - "E2E sync client"
      - "Example routing strategies"
  C-band:
    license: "Proprietary / dual-license TBD"
    content:
      - "Product shells (Prism/Eos/Enterprise HTTP deploy)"
      - "Compliance UI filters"
      - "Commercial routing policy"
      - "Audit reports, SSO, compliance templates"
      - "Signed Pack distribution"

motivation: |
  Schema is already public in ai-protocol; routing library openness matches
  MEMORY § prism-core; commercial value is operations + product policy,
  not hiding the engine (Report 3, plan audit 2026-06-04).

requirements:
  - "A-band code/assets must stay A-band; no downgrade without owner approval"
  - "C-band code must not leak into A-band public repos"
  - "Prism-core library (proxy, key-pool, router, usage, admin logic): A-band"
  - "Product shells / commercial policy: C-band"
  - "Eos consumer proxy paths are out of ai-lib product scope"
  - "Non-production hosts (e.g. HK eos.ailib.info) ≠ Prism production"
  - "Every new repo must declare its band in project-overview.md"

prism_split_2026_06_04: |
  Open library (prism-core) stays A-band. Closed product layers
  (gateway shell, enterprise policy, hosted ops) may be C-band.

violations_to_avoid:
  type: "governance"
  patterns:
    - "Moving A-band content to C-band without owner approval"
    - "Mixing C-band proprietary code into A-band public repos"
    - "Treating Eos proxy paths as ai-lib product scope"
    - "Treating HK dev host as Prism production"

validation:
  - type: "review"
    check: "Verify every repo's license matches its declared band"
  - type: "code_review"
    check: "No C-band content in A-band public repos"

references:
  source: "ai-lib-constitution/rules/business/BUSINESS_BOUNDARY_RULES.md"
  supersedes: "BIZ-002 section in BUSINESS_BOUNDARY_RULES.md"
  related_rules:
    - "BIZ-001"
    - "BIZ-003"
    - "GOV-004"
    - "GOV-005"

