---
rule_id: "GO-003"
title: "Go Concurrency — Goroutines, Channels, and Context"
category: "coding"
language: "go"
severity: "high"
priority: 2

applicable_projects:
  - "ai-lib-go"

description: |
  Use goroutines for async tasks, channels for communication, and Context
  for cancellation and timeout. 使用 goroutine 处理异步任务，channel 进通信，Context 处理取消和超时。

core_principle: |
  "Do not communicate by sharing memory; instead, share memory by communicating"

requirements:
  - "Every blocking operation MUST accept a context.Context"
  - "Use channels to aggregate streaming events"
  - "Avoid goroutine leaks: always have a way to shut them down"
  - "Use sync.Mutex or sync.RWMutex only when channels are not suitable"

forbidden_patterns:
  - type: "Infinite loop without select or limit"
    alternative: "Use select with ctx.Done() and timers"
    reason: "Causes high CPU and non-cancelable tasks"

  - type: "Passing pointers to range variables to goroutines"
    alternative: "Pass as function argument or shadow locally"
    reason: "Classic Go race condition"

correct_implementation:
  example: |
    func (c *Client) StreamChat(ctx context.Context, req *Request) (<-chan *Event, error) {
    	events := make(chan *Event)
    	go func() {
    		defer close(events)
    		for {
    			select {
    			case <-ctx.Done():
    				return
    			default:
    				// Fetch and send event...
    				event := &Event{Content: "..."}
    				events <- event
    			}
    		}
    	}()
    	return events, nil
    }

metadata:
  author: "ai-lib team"
  created: "2026-03-12"
  version: "1.0"
  status: "active"
