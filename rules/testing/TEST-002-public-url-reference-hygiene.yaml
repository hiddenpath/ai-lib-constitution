---
rule_id: "TEST-002"
title: "Public URL Reference Hygiene"
category: "testing"
severity: "high"
priority: 2
languages: []  # cross-language, cross-repository governance rule

applicable_projects:
  - "ai-protocol"
  - "ai-lib-rust"
  - "ai-lib-python"
  - "ai-lib-ts"
  - "ai-lib-go"
  - "ai-protocol-mock"
  - "spiderswitch"
  - "zerospider"
  - "ailib.info"

description: |
  All repository URLs in docs, examples, CI workflows, and runtime fetch
  endpoints MUST point to the **ailib-official** organization. Since GOV-001 v2.0
  ailib-official is the single canonical development org, there are no longer
  workflow exceptions for hiddenpath CI checkouts. The only remaining hiddenpath
  references should be in Go module paths (`go.mod`) until a dedicated module
  migration is planned, and legacy backward-compatibility fallback paths in
  runtime loader code (e.g. `node_modules/@hiddenpath/ai-protocol`).

core_principle: |
  "All links must resolve to ailib-official public sources"

required_checks:
  - "PR CI must run URL hygiene scan on changed files."
  - "Scan must fail when hiddenpath public URL patterns are detected."
  - "Exceptions must be explicit and path-scoped."

forbidden_public_patterns:
  - "https://github.com/hiddenpath/"
  - "https://raw.githubusercontent.com/hiddenpath/"
  - "https://api.github.com/repos/hiddenpath/"

allowed_exceptions:
  - path_glob: "**/go.mod"
    reason: "Go module identity may remain stable until dedicated migration plan."
  - path_glob: "**/loader.ts"
    reason: "Legacy backward-compatible node_modules fallback paths for @hiddenpath/ai-protocol."

ci_strategy:
  workflow_name: "URL Reference Hygiene"
  trigger:
    - "pull_request"
    - "push"
  behavior:
    - "Use ripgrep to detect forbidden patterns."
    - "Print violating files and fail the job."
    - "Optional manual autofix flow may open PRs with replacements."

validation:
  commands:
    - "rg -n \"https://github.com/hiddenpath/|https://raw.githubusercontent.com/hiddenpath/|https://api.github.com/repos/hiddenpath/\" . --glob \"!**/go.mod\" --glob \"!**/loader.ts\""
  pass_condition: "No matches returned."

references:
  official_protocol_repo: "https://github.com/ailib-official/ai-protocol"
  official_mock_repo: "https://github.com/ailib-official/ai-protocol-mock"
  related_rules:
    - "ARCH-003"
    - "DOC-002"
    - "TEST-001"
    - "GOV-001"

metadata:
  author: "ai-lib team"
  created: "2026-03-20"
  updated: "2026-04-06"
  version: "2.0"
  status: "active"
---
